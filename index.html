<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>iPhone Demo Frame</title>
    <style>
      :root {
        --bg: #ece5dc;
        --panel: rgba(255, 255, 255, 0.62);
        --panel-strong: rgba(255, 255, 255, 0.78);
        --line: rgba(255, 255, 255, 0.26);
        --text: #132238;
        --text-soft: rgba(19, 34, 56, 0.68);
        --phone-shell: linear-gradient(180deg, #1f2732 0%, #0e1117 100%);
        --wallpaper:
          radial-gradient(circle at 16% 20%, rgba(255, 214, 161, 0.36), transparent 20%),
          radial-gradient(circle at 74% 22%, rgba(255, 176, 161, 0.24), transparent 22%),
          linear-gradient(180deg, #ffbb7e 0%, #f08b71 30%, #c35b70 60%, #5d497e 100%);
        --wallpaper-dark:
          radial-gradient(circle at 16% 20%, rgba(163, 190, 255, 0.22), transparent 20%),
          radial-gradient(circle at 74% 22%, rgba(122, 132, 255, 0.18), transparent 24%),
          linear-gradient(180deg, #0d1732 0%, #172344 32%, #302763 63%, #130f27 100%);
        --glass: rgba(255, 255, 255, 0.16);
        --glass-strong: rgba(255, 255, 255, 0.22);
        --shadow: 0 30px 80px rgba(23, 26, 35, 0.28);
        --icon-shadow: 0 16px 30px rgba(19, 25, 39, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        min-height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 229, 196, 0.94), transparent 32%),
          linear-gradient(180deg, #fdf8ef 0%, #f2eae0 52%, #eadfd3 100%);
        color: var(--text);
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .scene {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: stretch;
        padding: 0;
      }

      @media (max-width: 768px) {
        html, body { background: var(--wallpaper); }
        .scene {
          display: flex;
          flex-direction: column;
          padding: 0;
          height: 100vh;
          height: 100dvh;
          overflow: hidden;
        }
        .side-panel { display: none; }
        .device-stage {
          flex: 1;
          width: 100%;
          height: 100%;
          display: flex;
          justify-content: center;
          align-items: stretch;
          overflow: hidden;
        }
        .iphone {
          width: 100%;
          height: 100%;
          min-height: unset;
          border-radius: 0;
          box-shadow: none;
          overflow: hidden;
          background: var(--wallpaper);
        }
        .screen {
          border-radius: 0;
          height: 100%;
          min-height: unset;
          overflow: hidden;
        }
        .home-view .status-bar {
          padding-top: calc(4px + env(safe-area-inset-top));
        }
        .lock-view {
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
        }
        .gesture-wrap {
          padding-bottom: max(14px, env(safe-area-inset-bottom));
        }
        .app-overlay.is-fullscreen {
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
        }
        .glow { display: none; }
      }

      .side-panel {
        padding: 24px;
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(24px);
        box-shadow: 0 22px 54px rgba(101, 73, 43, 0.1);
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #be6323;
        font-weight: 700;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .side-panel h1 {
        font-size: clamp(2rem, 3.8vw, 2.9rem);
        line-height: 1.02;
        letter-spacing: -0.04em;
      }

      .lead {
        margin-top: 16px;
        line-height: 1.7;
        color: var(--text-soft);
      }

      .feature-list {
        margin: 20px 0 0;
        padding-left: 18px;
        line-height: 1.9;
        color: var(--text-soft);
      }

      .control-grid {
        margin-top: 18px;
        display: grid;
        gap: 10px;
      }

      .control-button {
        padding: 13px 16px;
        border-radius: 16px;
        text-align: left;
        color: var(--text);
        background: rgba(19, 34, 56, 0.08);
      }

      .control-button.is-active {
        color: #fff;
        background: linear-gradient(135deg, #182434, #334664);
      }

      .device-stage {
        flex: 0 0 auto;
        width: min(100%, 393px);
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
      }

      .iphone {
        flex: 1;
        display: flex;
        flex-direction: column;
        width: 100%;
        padding: 0;
        border-radius: 0;
        background: none;
        box-shadow: none;
        position: relative;
      }

      .glow {
        position: absolute;
        border-radius: 999px;
        filter: blur(26px);
        opacity: 0.7;
        pointer-events: none;
      }

      .glow-one {
        width: 200px;
        height: 200px;
        background: rgba(255, 193, 92, 0.32);
        top: 2%;
        left: -6%;
      }

      .glow-two {
        width: 230px;
        height: 230px;
        background: rgba(102, 132, 255, 0.24);
        bottom: 8%;
        right: -10%;
      }

      .dynamic-island { display: none; }

      .screen {
        flex: 1;
        border-radius: 0;
        overflow: hidden;
        position: relative;
        background: var(--wallpaper);
        padding: 0;
      }

      .iphone[data-theme="night"] .screen {
        background: var(--wallpaper-dark);
      }

      .screen::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 26%),
          radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.22), transparent 16%);
        pointer-events: none;
      }

      /* ── 解锁动画：主屏从底部浮现，锁屏缩小淡出 ── */
      .view {
        position: absolute;
        inset: 0;
        z-index: 1;
        overflow-y: auto;
        visibility: hidden;
      }

      /* 锁屏默认状态：待命（隐藏，由 is-active 控制显示） */
      .lock-view {
        transform: scale(1);
        opacity: 1;
        transition:
          transform 480ms cubic-bezier(.32,0,.67,0),
          opacity 480ms cubic-bezier(.32,0,.67,0);
        z-index: 2;
      }

      /* 锁屏激活 */
      .lock-view.is-active {
        visibility: visible;
        transform: scale(1);
        opacity: 1;
      }

      /* 锁屏退出：缩小淡出 */
      .lock-view.is-above {
        transform: scale(0.88);
        opacity: 0;
        visibility: hidden;
        transition:
          transform 480ms cubic-bezier(.32,0,.67,0),
          opacity 480ms cubic-bezier(.32,0,.67,0),
          visibility 0s 480ms;
      }

      /* 锁屏在下方（主屏激活时）：彻底隐藏 */
      .lock-view.is-below {
        transform: scale(1);
        opacity: 0;
        visibility: hidden;
        transition: opacity 300ms ease, visibility 0s 300ms;
      }

      /* 主屏默认：从下方待命 */
      .home-view {
        transform: translateY(100%);
        opacity: 0;
        transition: none;
        visibility: hidden;
      }

      /* 主屏进入：弹性浮现 */
      .home-view.is-active {
        transform: translateY(0);
        opacity: 1;
        transition:
          transform 520ms cubic-bezier(.22,1,.36,1),
          opacity 320ms ease;
        visibility: visible;
      }

      /* 主屏退回锁屏时回到底部 */
      .home-view.is-below {
        transform: translateY(100%);
        opacity: 0;
        visibility: hidden;
        transition:
          transform 360ms cubic-bezier(.55,0,1,.45),
          opacity 260ms ease,
          visibility 0s 360ms;
      }

      /* ── 锁屏布局 ── */
      .lock-view {
        color: #fff;
        display: flex;
        flex-direction: column;
        min-height: 100%;
        background: transparent;
      }

      .lock-statusbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 20px 0;
        font-size: 0.82rem;
        font-weight: 600;
      }

      .lock-status-icons {
        display: flex;
        gap: 7px;
        align-items: center;
      }

      .lock-clock {
        text-align: center;
        margin-top: 28px;
        flex-shrink: 0;
      }

      .lock-date {
        font-size: 1.05rem;
        font-weight: 400;
        opacity: 0.88;
        letter-spacing: 0.01em;
      }

      .lock-time {
        margin-top: 4px;
        font-size: 6rem;
        line-height: 1;
        font-weight: 300;
        letter-spacing: -0.04em;
      }

      /* ── 通知卡片 ── */
      .lock-notifications {
        flex: 1;
        padding: 24px 16px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        justify-content: flex-end;
        padding-bottom: 20px;
      }

      .lock-notif-card {
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(28px) saturate(1.6);
        -webkit-backdrop-filter: blur(28px) saturate(1.6);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 20px;
        padding: 14px 16px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      }

      .lock-notif-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }

      .lock-notif-icon {
        font-size: 0.9rem;
        line-height: 1;
      }

      .lock-notif-app {
        font-size: 0.75rem;
        font-weight: 600;
        opacity: 0.82;
        flex: 1;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .lock-notif-time {
        font-size: 0.72rem;
        opacity: 0.6;
      }

      .lock-notif-title {
        font-size: 0.92rem;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .lock-notif-body {
        font-size: 0.88rem;
        opacity: 0.78;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── 上划解锁提示 ── */
      .lock-swipe-hint {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding-bottom: 10px;
        color: rgba(255,255,255,0.7);
        user-select: none;
        pointer-events: none;
      }

      .lock-swipe-arrow {
        font-size: 1.1rem;
        animation: swipe-bounce 1.8s ease-in-out infinite;
      }

      .lock-swipe-label {
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        font-weight: 500;
      }

      @keyframes swipe-bounce {
        0%, 100% { transform: translateY(0); opacity: 0.5; }
        50% { transform: translateY(-5px); opacity: 1; }
      }

      /* 手势条 */
      .lock-gesture {
        margin-top: 0;
        padding-bottom: 8px;
      }

      .widget-card,
      .control-center,
      .library-card,
      .app-card,
      .info-card,
      .quick-tile,
      .mini-widget,
      .dock,
      .search-pill,
      .notification-card {
        background: var(--glass);
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(24px);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
      }

      .widget-card {
        min-height: 112px;
        border-radius: 24px;
        padding: 16px;
      }

      .widget-card h3 {
        margin-top: 6px;
        font-size: 1.35rem;
      }

      .widget-label {
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.72;
      }

      .widget-stack {
        display: grid;
        gap: 12px;
      }

      .mini-widget {
        border-radius: 22px;
        padding: 14px;
        min-height: 50px;
      }

      .home-view {
        color: #fff;
        min-height: 100%;
        background: transparent;
        overflow-y: auto;
      }

      .status-bar {
        min-height: 58px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 4px 10px;
      }

      .status-time,
      .status-action {
        background: transparent;
        color: inherit;
      }

      .status-time {
        padding: 8px 10px;
        border-radius: 999px;
        font-weight: 600;
      }

      .status-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-action {
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
      }

      .home-widgets {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 12px;
      }

      .icon-grid {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 18px 12px;
      }

      .app-icon {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        background: transparent;
        color: #fff;
      }

      .icon-tile {
        width: 62px;
        height: 62px;
        border-radius: 19px;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 1.36rem;
        box-shadow: var(--icon-shadow);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .app-icon:hover .icon-tile,
      .control-button:hover,
      .status-action:hover,
      .status-time:hover,
      .unlock-cta:hover,
      .quick-tile:hover,
      .library-pill:hover,
      .dock-icon:hover,
      .gesture-bar:hover,
      .segmented-button:hover {
        transform: translateY(-2px);
      }

      .icon-messages { background: linear-gradient(135deg, #6e84ff, #7ed0ff); }
      .icon-music { background: linear-gradient(135deg, #ff6a77, #ffbe74); }
      .icon-camera { background: linear-gradient(135deg, #1b2740, #6d7a98); }
      .icon-maps { background: linear-gradient(135deg, #5fd48a, #31b6b1); }
      .icon-notes { background: linear-gradient(135deg, #ffe27a, #f3a645); color: #5c3815; }
      .icon-health { background: linear-gradient(135deg, #ff7da8, #f14b76); }
      .icon-gallery { background: linear-gradient(135deg, #cc90ff, #ff78b9); }
      .icon-browser { background: linear-gradient(135deg, #77b8ff, #6c7aff); }
      .icon-phone { background: linear-gradient(135deg, #46e28e, #36b96e); }
      .icon-mail { background: linear-gradient(135deg, #7bd5ff, #427fff); }
      .icon-fitness { background: linear-gradient(135deg, #ff7ca6, #f64e7c); }
      .icon-files { background: linear-gradient(135deg, #b7c7ff, #7f95ff); }

      .app-name {
        font-size: 0.8rem;
      }

      .dock {
        margin-top: 24px;
        padding: 12px 14px;
        border-radius: 30px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .dock-icon {
        background: transparent;
      }

      .search-pill {
        margin-top: 14px;
        width: 100%;
        border-radius: 18px;
        padding: 14px 18px;
        color: rgba(255, 255, 255, 0.82);
        text-align: left;
      }

      .gesture-wrap {
        margin-top: 14px;
        display: flex;
        justify-content: center;
      }

      .gesture-bar {
        width: 136px;
        height: 5px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.88);
      }

      .library-view {
        color: #fff;
      }

      .library-search {
        margin-top: 10px;
      }

      .library-search input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        outline: none;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }

      .library-search input::placeholder {
        color: rgba(255, 255, 255, 0.64);
      }

      .library-grid {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }

      .library-card {
        border-radius: 24px;
        padding: 16px;
      }

      .library-card h3 {
        font-size: 0.98rem;
        margin-bottom: 12px;
      }

      .library-icons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      .library-pill {
        display: grid;
        place-items: center;
        width: 54px;
        height: 54px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }

      .control-overlay,
      .app-overlay {
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        opacity: 0;
        transition: opacity 220ms ease;
      }

      .control-overlay.is-visible,
      .app-overlay.is-visible {
        opacity: 1;
        pointer-events: auto;
      }

      .control-overlay {
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: flex-end;
        padding-bottom: 0;
      }

      .control-center-panel {
        width: 100%;
        background: #1c1a17;
        border-radius: 28px 28px 0 0;
        padding: 20px 18px 36px;
        transform: translateY(100%);
        transition: transform 320ms cubic-bezier(.22,1,.36,1);
      }

      .control-overlay.is-visible .control-center-panel {
        transform: translateY(0);
      }

      .cc-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      .cc-eyebrow {
        font-size: 10px;
        letter-spacing: 0.12em;
        color: #888;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .cc-title {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
      }

      .cc-close {
        width: 28px; height: 28px;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        color: #fff;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cc-sliders {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 14px;
      }

      .cc-slider-card {
        background: #2a2825;
        border-radius: 18px;
        padding: 14px 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 200px;
      }

      .cc-slider-top {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #aaa;
      }

      .cc-slider-track {
        flex: 1;
        background: #3a3835;
        border-radius: 999px;
        position: relative;
        cursor: pointer;
        overflow: hidden;
      }

      .cc-slider-fill {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        background: #fff;
        border-radius: 999px;
        transition: height .1s;
      }

      .cc-slider-dot {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #e8335a;
        transition: bottom .1s;
        z-index: 2;
      }

      .cc-theme-card {
        background: linear-gradient(135deg, #3d2e1e, #5a3e28);
        border-radius: 18px;
        padding: 16px 18px;
        cursor: pointer;
      }

      .cc-theme-title {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        margin: 4px 0;
      }

      .cc-theme-sub {
        font-size: 12px;
        color: rgba(255,255,255,0.6);
      }

      .control-center {
        width: 100%;
        height: 100%;
        border-radius: 30px;
        padding: 18px;
        color: #fff;
        background: rgba(20, 23, 33, 0.5);
      }

      .control-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .close-pill {
        padding: 10px 14px;
        border-radius: 999px;
        color: #fff;
        background: rgba(255, 255, 255, 0.1);
      }

      .control-layout {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 12px;
      }

      .control-stack {
        display: grid;
        gap: 12px;
      }

      .quick-cluster {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .quick-tile {
        min-height: 82px;
        border-radius: 24px;
        padding: 14px;
        text-align: left;
        color: #fff;
      }

      .quick-tile.is-on {
        background: linear-gradient(135deg, rgba(122, 212, 255, 0.48), rgba(107, 133, 255, 0.34));
      }

      .now-playing {
        min-height: 176px;
      }

      .vertical-sliders {
        display: grid;
        gap: 12px;
      }

      .slider-tile,
      .utility-tile {
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.12);
        padding: 16px;
        color: #fff;
      }

      .slider {
        width: 100%;
        margin-top: 10px;
      }

      .utility-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .utility-tile {
        min-height: 82px;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .app-overlay {
        display: grid;
        place-items: end center;
        padding: 94px 14px 76px;
        background: rgba(8, 10, 16, 0.2);
      }

      .app-overlay.is-fullscreen {
        padding: 0;
        place-items: stretch;
        display: flex;
        flex-direction: column;

    <script>
      const appCatalog = {

          actions: ["最近照片", "人物分类", "精选内容"],
        },
        files: {
          title: "文件",
          description: "可以接文件管理、项目目录浏览或素材中转页。",
          actions: ["最近文件", "浏览文件夹", "共享项目"],
        },
        phone: {
          title: "电话",
          description: "适合作为拨号、联系人、通话记录或热线页面。",
          actions: ["拨号盘", "最近通话", "联系人"],
        },
        browser: {
          title: "Safari",
          description: "可以接 WebView 容器、资讯页或业务工作台入口。",
          actions: ["继续浏览", "阅读列表", "打开标签页"],
        },
        mail: {
          title: "邮件",
          description: "适合做收件箱、审批消息或商务通知中心。",
          actions: ["收件箱", "写邮件", "星标邮件"],
        },
      };

      const iphone = document.querySelector(".iphone");
      const views = [...document.querySelectorAll(".view")];
      const controlOverlay = document.querySelector(".control-overlay");
      const appOverlay = document.querySelector(".app-overlay");
      const appTitle = document.getElementById("app-title");
      const appDesc = document.getElementById("app-desc");
      const appActions = document.getElementById("app-actions");
      const feed = document.getElementById("feed");
      const lockTime = document.querySelector(".lock-time");
      const statusTimes = [...document.querySelectorAll(".status-time")];
      const demoViewButtons = [...document.querySelectorAll("[data-demo-view]")];
      const sideButtons = [...document.querySelectorAll(".control-grid .control-button")];

      let currentView = "lock";

      const timeFormatter = new Intl.DateTimeFormat("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
      });

      function log(title, detail) {
        const item = document.createElement("article");
        item.className = "feed-item";
        item.innerHTML = `<strong>${title}</strong><span>${detail}</span>`;
        feed.prepend(item);
      }

      function refreshTime() {
        const now = new Date();
        const timeStr = timeFormatter.format(now);
        // 锁屏时间
        const lockTimeEl = document.getElementById("lockTime");
        if (lockTimeEl) lockTimeEl.textContent = timeStr;
        // 锁屏日期
        const lockDateEl = document.getElementById("lockDate");
        if (lockDateEl) {
          lockDateEl.textContent = new Intl.DateTimeFormat("zh-CN", {
            weekday: "long", month: "long", day: "numeric"
          }).format(now);
        }
        // 主屏状态栏
        const homeTime = document.querySelector(".home-view .status-time");
        if (homeTime) homeTime.textContent = timeStr;
      }

      function setView(name) {
        currentView = name;
        views.forEach((view) => {
          const vName = view.dataset.view;
          // 清除所有状态类和内联样式残留
          view.classList.remove("is-active", "is-above", "is-below");
          view.style.cssText = "";
          if (vName === name) {
            view.classList.add("is-active");
          } else {
            view.classList.add("is-below");
          }
        });
      }

      function openControls() {
        controlOverlay.hidden = false;
        requestAnimationFrame(() => {
          controlOverlay.classList.add("is-visible");
        });
        log("控制中心", `已展开控制中心 · ${timeFormatter.format(new Date())}`);
      }

      function closeControls(shouldLog = true) {
        controlOverlay.classList.remove("is-visible");
        setTimeout(() => {
          if (!controlOverlay.classList.contains("is-visible")) {
            controlOverlay.hidden = true;
          }
        }, 220);
        if (shouldLog) {
          log("控制中心", `已关闭控制中心 · ${timeFormatter.format(new Date())}`);
        }
      }

      // ── 上滑解锁手势（跟手拖拽，仿 iOS18）──
      const phoneScreen = document.querySelector(".screen");
      const lockView = document.querySelector(".lock-view");
      const homeView = document.querySelector(".home-view");

      let dragStartY = 0;
      let dragging = false;
      let dragDy = 0;
      const UNLOCK_THRESHOLD = 120; // 上滑超过此距离触发解锁

      function applyDragProgress(dy) {
        // dy < 0 为上滑，夹在 [-screenH, 0]
        const progress = Math.max(0, Math.min(1, -dy / UNLOCK_THRESHOLD));
        // 锁屏：随手指上移 + 轻微缩小
        const scale = 1 - progress * 0.1;
        const lockTranslate = dy < 0 ? dy * 0.4 : 0; // 跟手但有阻尼
        lockView.style.transition = "none";
        lockView.style.transform = `translateY(${lockTranslate}px) scale(${scale})`;
        lockView.style.opacity = 1 - progress * 0.6;
        // 主屏：从下方随手指浮现
        homeView.style.visibility = "visible";
        homeView.style.transition = "none";
        homeView.style.transform = `translateY(${(1 - progress) * 100}%)`;
        homeView.style.opacity = progress;
      }

      function cancelDrag() {
        // 回弹到锁屏
        lockView.style.transition = "transform 380ms cubic-bezier(.22,1,.36,1), opacity 380ms ease";
        lockView.style.transform = "";
        lockView.style.opacity = "";
        homeView.style.transition = "transform 380ms cubic-bezier(.22,1,.36,1), opacity 380ms ease";
        homeView.style.transform = "translateY(100%)";
        homeView.style.opacity = "0";
        setTimeout(() => {
          homeView.style.visibility = "";
          homeView.style.transform = "";
          homeView.style.opacity = "";
          homeView.style.transition = "";
        }, 380);
      }

      function commitUnlock() {
        // 完成解锁动画后切换状态
        lockView.style.transition = "transform 400ms cubic-bezier(.32,0,.67,0), opacity 400ms ease";
        lockView.style.transform = "scale(0.88)";
        lockView.style.opacity = "0";
        homeView.style.transition = "transform 420ms cubic-bezier(.22,1,.36,1), opacity 280ms ease";
        homeView.style.transform = "translateY(0)";
        homeView.style.opacity = "1";
        homeView.style.visibility = "visible";
        setTimeout(() => {
          // 清内联样式，交由 class 驱动
          lockView.style.cssText = "";
          homeView.style.cssText = "";
          setView("home");
        }, 420);
      }

      phoneScreen.addEventListener("touchstart", e => {
        if (currentView !== "lock") return;
        dragStartY = e.touches[0].clientY;
        dragging = true;
        dragDy = 0;
      }, { passive: true });

      phoneScreen.addEventListener("touchmove", e => {
        if (!dragging || currentView !== "lock") return;
        dragDy = e.touches[0].clientY - dragStartY;
        if (dragDy > 0) { dragDy = 0; return; } // 下滑不响应
        applyDragProgress(dragDy);
      }, { passive: true });

      phoneScreen.addEventListener("touchend", () => {
        if (!dragging || currentView !== "lock") return;
        dragging = false;
        if (dragDy < -UNLOCK_THRESHOLD) {
          commitUnlock();
        } else {
          cancelDrag();
        }
      }, { passive: true });

      // 桌面端：鼠标模拟上滑解锁
      phoneScreen.addEventListener("mousedown", e => {
        if (currentView !== "lock") return;
        dragStartY = e.clientY;
        dragging = true;
        dragDy = 0;
        const onMove = ev => {
          dragDy = ev.clientY - dragStartY;
          if (dragDy > 0) { dragDy = 0; return; }
          applyDragProgress(dragDy);
        };
        const onUp = () => {
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
          if (!dragging) return;
          dragging = false;
          if (dragDy < -UNLOCK_THRESHOLD) {
            commitUnlock();
          } else {
            cancelDrag();
          }
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });

      // 主屏：下滑呼出控制中心
      phoneScreen.addEventListener("touchstart", e => {
        if (currentView !== "home") return;
        touchStartY = e.touches[0].clientY;
        touchStartX = e.touches[0].clientX;
      }, { passive: true });

      phoneScreen.addEventListener("touchend", e => {
        if (currentView !== "home") return;
        const dy = e.changedTouches[0].clientY - touchStartY;
        const dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
        if (Math.abs(dy) < 50 || dx > 80) return;
        if (dy > 60 && !controlOverlay.classList.contains("is-visible")) {
          openControls();
        } else if (dy < -60 && controlOverlay.classList.contains("is-visible")) {
          closeControls();
        }
      }, { passive: true });

      let touchStartY = 0, touchStartX = 0;

      // 滑块交互
      function initCCSlider(trackId, fillId, dotId, valId) {
        const track = document.querySelector(`#${trackId} .cc-slider-track`) ||
          document.querySelectorAll(".cc-slider-track")[trackId];
        const fill = document.getElementById(fillId);
        const dot = document.getElementById(dotId);
        const val = document.getElementById(valId);
        if (!fill || !dot || !val) return;
        const parent = fill.closest(".cc-slider-track");

        function update(clientY) {
          const rect = parent.getBoundingClientRect();
          let pct = 1 - (clientY - rect.top) / rect.height;
          pct = Math.max(0, Math.min(1, pct));
          fill.style.height = (pct * 100) + "%";
          dot.style.bottom = `calc(${pct * 100}% - 12px)`;
          val.textContent = Math.round(pct * 100) + "%";
        }

        parent.addEventListener("touchstart", e => update(e.touches[0].clientY), { passive: true });
        parent.addEventListener("touchmove", e => { e.preventDefault(); update(e.touches[0].clientY); }, { passive: false });
        parent.addEventListener("mousedown", e => {
          update(e.clientY);
          const move = ev => update(ev.clientY);
          const up = () => { document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); };
          document.addEventListener("mousemove", move);
          document.addEventListener("mouseup", up);
        });
      }

      const sliderCards = document.querySelectorAll(".cc-slider-card");
      if (sliderCards[0]) {
        const t0 = sliderCards[0].querySelector(".cc-slider-track");
        const t1 = sliderCards[1] && sliderCards[1].querySelector(".cc-slider-track");
        function makeSlider(track, fillId, dotId, valId) {
          const fill = document.getElementById(fillId);
          const dot = document.getElementById(dotId);
          const val = document.getElementById(valId);
          function update(clientY) {
            const rect = track.getBoundingClientRect();
            let pct = 1 - (clientY - rect.top) / rect.height;
            pct = Math.max(0, Math.min(1, pct));
            fill.style.height = (pct * 100) + "%";
            dot.style.bottom = `calc(${pct * 100}% - 12px)`;
            val.textContent = Math.round(pct * 100) + "%";
          }
          track.addEventListener("touchstart", e => update(e.touches[0].clientY), { passive: true });
          track.addEventListener("touchmove", e => { e.preventDefault(); update(e.touches[0].clientY); }, { passive: false });
          track.addEventListener("mousedown", e => {
            update(e.clientY);
            const mv = ev => update(ev.clientY);
            const up = () => { document.removeEventListener("mousemove", mv); document.removeEventListener("mouseup", up); };
            document.addEventListener("mousemove", mv);
            document.addEventListener("mouseup", up);
          });
        }
        if (t0) makeSlider(t0, "brightnessFill", "brightnessDot", "brightnessVal");
        if (t1) makeSlider(t1, "volumeFill", "volumeDot", "volumeVal");
      }

      // 昼夜切换
      document.getElementById("ccThemeCard").addEventListener("click", () => {
        const iphone = document.querySelector(".iphone");
        const isNight = iphone.dataset.theme === "night";
        iphone.dataset.theme = isNight ? "day" : "night";
        document.getElementById("ccThemeTitle").textContent = isNight ? "白昼模式" : "夜幕模式";
        document.getElementById("ccThemeSub").textContent = isNight ? "点击切换夜幕" : "点击切换白昼";
      });

      function openApp(appKey, source = "主屏") {
        const app = appCatalog[appKey];
        if (!app) return;

        if (currentView === "lock") {
          setView("home", false);
        }

        closeControls(false);

        const appBody = document.getElementById("app-body");

        if (app.url) {
          // 全屏 iframe 方式打开内嵌 app
          appOverlay.classList.add("is-fullscreen");
          const card = appOverlay.querySelector(".app-card");
          card.style.cssText = "";
          const head = appOverlay.querySelector(".app-head");
          head.style.cssText = "";
          appBody.style.cssText = "margin:0;padding:0;height:100%;overflow:hidden;";
          appBody.innerHTML = `<iframe src="${app.url}" style="width:100%;height:100%;border:none;display:block;" allow="autoplay"></iframe>`;
          appOverlay.hidden = false;
          requestAnimationFrame(() => {
            appOverlay.classList.add("is-visible");
          });
          log(app.title, `从${source}打开 · ${timeFormatter.format(new Date())}`);
          return;
        }

        appTitle.textContent = app.title;
        appOverlay.classList.remove("is-fullscreen");
        appOverlay.style.cssText = "";
        const card = appOverlay.querySelector(".app-card");
        card.style.cssText = "";
        const head = appOverlay.querySelector(".app-head");
        head.style.cssText = "";
        appBody.style.cssText = "";
        appBody.innerHTML = `<p id="app-desc">${app.description}</p><div class="segmented-actions" id="app-actions"></div>`;
        app.actions.forEach((label) => {
          const button = document.createElement("button");
          button.className = "segmented-button";
          button.type = "button";
          button.textContent = label;
          button.addEventListener("click", () => {
            log(app.title, `触发动作: ${label} · ${timeFormatter.format(new Date())}`);
          });
          document.getElementById("app-actions").append(button);
        });

        appOverlay.hidden = false;
        requestAnimationFrame(() => {
          appOverlay.classList.add("is-visible");
        });
        log(app.title, `从${source}打开 · ${timeFormatter.format(new Date())}`);
      }

      function closeApp() {
        appOverlay.classList.remove("is-visible");
        appOverlay.classList.remove("is-fullscreen");
        appOverlay.style.cssText = "";
        const card = appOverlay.querySelector(".app-card");
        if (card) card.style.cssText = "";
        const head = appOverlay.querySelector(".app-head");
        if (head) head.style.cssText = "";
        const body = document.getElementById("app-body");
        if (body) body.style.cssText = "";
        setTimeout(() => {
          if (!appOverlay.classList.contains("is-visible")) {
            appOverlay.hidden = true;
          }
        }, 260);
        // 确保停在主屏，直接设类不触发动画（app 关闭本身就是动画）
        if (currentView !== "home") {
          currentView = "home";
          views.forEach(v => {
            v.style.cssText = "";
            v.classList.remove("is-active", "is-above", "is-below");
            v.classList.add(v.dataset.view === "home" ? "is-active" : "is-below");
          });
        }
      }

      document.querySelectorAll("[data-app]").forEach((button) => {
        button.addEventListener("click", () => {
          const source = button.closest(".library-view") ? "App Library" : button.closest(".dock") ? "Dock" : "主屏";
          openApp(button.dataset.app, source);
        });
      });

      demoViewButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setView(button.dataset.demoView);
        });
      });

      document.querySelectorAll("[data-demo-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const action = button.dataset.demoAction;

          if (action === "controls") {
            openControls();
            return;
          }

          if (action === "close-controls") {
            closeControls();
            return;
          }

          if (action === "close-app") {
            closeApp();
            return;
          }

          if (action === "theme") {
            const nextTheme = iphone.dataset.theme === "day" ? "night" : "day";
            iphone.dataset.theme = nextTheme;
            log("主题切换", `当前主题: ${nextTheme === "day" ? "白昼" : "夜幕"} · ${timeFormatter.format(new Date())}`);
            return;
          }

          if (action === "lock") {
            setView("lock");
            log("锁屏", `已返回锁屏界面 · ${timeFormatter.format(new Date())}`);
            return;
          }

          if (action === "close-all") {
            closeControls(false);
            closeApp(false);
            log("系统整理", `已关闭所有浮层 · ${timeFormatter.format(new Date())}`);
            return;
          }

          if (action === "clear-feed") {
            feed.innerHTML = "";
            log("记录", `交互记录已清空 · ${timeFormatter.format(new Date())}`);
          }
        });
      });

      document.querySelectorAll(".quick-tile").forEach((tile) => {
        tile.addEventListener("click", () => {
          tile.classList.toggle("is-on");
          log("快捷开关", `${tile.textContent.trim()} 已${tile.classList.contains("is-on") ? "开启" : "关闭"} · ${timeFormatter.format(new Date())}`);
        });
      });

      document.querySelectorAll(".slider").forEach((slider) => {
        slider.addEventListener("input", () => {
          const label = slider.closest(".slider-tile").querySelector(".widget-label").textContent;
          log(label, `调整到 ${slider.value}% · ${timeFormatter.format(new Date())}`);
        });
      });

      refreshTime();
      setInterval(refreshTime, 30000);
      log("演示页已加载", "可以直接切换锁屏、主屏、App Library、控制中心并查看动画");

      // 监听 iframe 内嵌 app 发来的关闭消息
      window.addEventListener("message", (e) => {
        if (e.data === "close-app") {
          closeApp();
        }
      });
    </script>
  </body>
</html>
